name: Deploy to Liara

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "22"

      # گیت کیفیت — قبل از deploy. چون next.config چک‌های داخل build را خاموش
      # کرده (تا Liara timeout نشود)، type-check و tests اینجا اجرا می‌شوند.
      # اگر هرکدام fail شود، deploy اجرا نمی‌شود.
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Unit tests
        run: npm test

      - name: Deploy to Liara
        env:
          LIARA_TOKEN: ${{ secrets.LIARA_API_TOKEN }}
        run: |
          npm i -g @liara/cli@9
          liara deploy --app="basharaff" --api-token="$LIARA_TOKEN" --no-app-logs
